services:
  - type: web
    name: srs-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free

    envVars:
      - key: APP_NAME
        value: SRS-ERP
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: srs-backend
          property: host

      # ── Database (TiDB Cloud) ────────────────────────────────────
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        sync: false          # paste your TiDB host here in Render dashboard
      - key: DB_PORT
        value: "4000"        # TiDB Cloud default port
      - key: DB_DATABASE
        sync: false          # paste your TiDB database name
      - key: DB_USERNAME
        sync: false          # paste your TiDB username
      - key: DB_PASSWORD
        sync: false          # paste your TiDB password
      - key: MYSQL_ATTR_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt

      # ── Session / Cache ──────────────────────────────────────────
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: array
      - key: QUEUE_CONNECTION
        value: sync

      # ── Logging ──────────────────────────────────────────────────
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # ── CORS / Sanctum ───────────────────────────────────────────
      - key: SANCTUM_STATEFUL_DOMAINS
        value: srserp.vercel.app
      - key: FRONTEND_URL
        value: https://srserp.vercel.app
